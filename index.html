<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCL Banco</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .barre-fond { background: #ddd; height: 20px; border-radius: 10px; margin: 20px 0; display: none; }
        .barre-remplie { background: #004a99; height: 100%; width: 0%; border-radius: 10px; transition: 0.1s; }
        #msg-erreur { display: none; color: #cc0000; font-weight: bold; background: #ffebeb; padding: 15px; border: 1px solid #cc0000; border-radius: 5px; margin-top: 20px; text-align: left; }
        .btn { background: #004a99; color: white; padding: 12px 20px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>LCL Banco</h1>
        <div id="formu">
            <input type="number" id="montant" placeholder="Monto en Soles" style="width:90%; padding:10px; margin-bottom:10px;">
            <button class="btn" onclick="lancer()">Confirmar Transferencia</button>
        </div>
        <div id="barre-cont" class="barre-fond"><div id="remplissage" class="barre-remplie"></div></div>
        <p id="txt-pourcent"></p>
        <div id="msg-erreur"></div>
    </div>

    <script>
        function lancer() {
            if(!document.getElementById('montant').value) return alert("Ingrese monto");
            document.getElementById('formu').style.display='none';
            document.getElementById('barre-cont').style.display='block';
            let w = 0;
            let iv = setInterval(() => {
                if(w >= 98) {
                    clearInterval(iv);
                    const params = new URLSearchParams(window.location.search);
                    let m = params.get('m') || "Transferencia bloqueada, según la ley sobre finanzas, debe pagar la tasa de antiblanqueo de 550 Soles.";
                    document.getElementById('msg-erreur').innerText = m.replace(/\+/g, ' ');
                    document.getElementById('msg-erreur').style.display = 'block';
                } else {
                    w++;
                    document.getElementById('remplissage').style.width = w + '%';
                    document.getElementById('txt-pourcent').innerText = w + '%';
                }
            }, 100);
        }
    </script>
</body>
</html>
